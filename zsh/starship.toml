"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = "$os$directory$git_branch$git_status$kubernetes$cmd_duration$status$character"

# ---- OS (símbolo pequeno) ----
[os]
disabled = false
format = "[$symbol ](bold blue)"
[os.symbols]
Ubuntu  = "󰕈"
Debian  = "󰣚"
Arch    = "󰣇"
Linux   = "󰌽"
Macos   = ""
Windows = "󰍲"

# ---- Diretório ----
[directory]
format            = "[$path ](cyan)"
truncation_length = 3
truncation_symbol = "…/"
home_symbol       = "~"
truncate_to_repo  = true

# ---- Git branch ----
[git_branch]
symbol = ""
format = "[$symbol $branch ](bold purple)"

# ---- Git status (rico, do teu starship_full, em estilo limpo) ----
[git_status]
format     = "($ahead_behind$staged$modified$renamed$deleted$stashed$untracked$conflicted)"
ahead      = "[⇡ $count ](bold cyan)"
behind     = "[⇣ $count ](bold cyan)"
diverged   = "[⇡ $ahead_count⇣$behind_count ](bold cyan)"
staged     = "[+ $count ](bold green)"
modified   = "[● $count ](bold yellow)"
renamed    = "[» $count ](bold blue)"
deleted    = "[✘ $count ](bold red)"
stashed    = "[≡ $count ](bold magenta)"
untracked  = "[? $count ](bold white)"
conflicted = "[ $count ](bold red)"

# ---- Kubernetes (always-on: contexto + namespace) ----
[kubernetes]
disabled = false
symbol   = "☸ "
format   = '[$symbol$context( \($namespace\))](bold blue) '
[kubernetes.context_aliases]
# encurta ARNs de EKS: arn:aws:eks:...:cluster/prd -> prd
".*:cluster/(?P<c>[\\w-]+)" = "$c"

# ---- Duração do último comando (se > 500ms) ----
[cmd_duration]
min_time = 500
format   = "[ $duration ](bold yellow)"

# ---- Código de saída (só em erro) ----
[status]
disabled   = false
format     = "[$symbol$status ](bold red)"
symbol     = "✘ "
map_symbol = true

# ---- Prompt char ----
[character]
success_symbol = "[❯](green)"
error_symbol   = "[❯](red)"
vimcmd_symbol  = "[❮](blue)"