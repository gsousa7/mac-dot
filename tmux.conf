# Colors
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:RGB"
set-option -sa terminal-features ',xterm-256color:RGB'

# Configuration
set -g base-index 1
setw -g pane-base-index 1
set -g escape-time 0
set -g history-limit 1000000
set -g renumber-windows on
set -g set-clipboard on
set -g status-position top
set -g mouse on

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Configuration reloaded!"

# Keybindings
unbind C-b
unbind C-z
bind z resize-pane -Z
set -g prefix C-a
bind C-a send-prefix
bind C-s setw synchronize-panes \; display "Sync panes toggled"

# Resurrect plugin bindings
bind S run-shell "~/.config/tmux/plugins/tmux-resurrect/scripts/save.sh"
bind C-r run-shell "~/.config/tmux/plugins/tmux-resurrect/scripts/restore.sh"

# Navigation between panes with Alt + arrow
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes with Alt + Shift + arrow
bind -n M-S-Left resize-pane -L 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Up resize-pane -U 2
bind -n M-S-Down resize-pane -D 2

# Split panes
unbind '"'
unbind '%'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind -n M-\\ split-window -h -c "#{pane_current_path}"
bind -n M-- split-window -v -c "#{pane_current_path}"

# Quick window switching (add after your split panes section)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Swap panes easily (add after resize panes section)
bind -n M-H swap-pane -U  # Swap with pane above
bind -n M-L swap-pane -D  # Swap with pane below

# Equalize pane sizes
bind = select-layout tiled

# Move window to specific position
bind m command-prompt -p "Move window to position:" "move-window -t '%%'"

# Quick session tree view  
bind C-t choose-tree -Zs

# TPM
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# Theme colors
bg="#3B4252"
default_fg="#D8DEE9"
session_fg="#A3BE8C"
session_selection_fg="#3B4252"
session_selection_bg="#81A1C1"
active_window_fg="#88C0D0"
active_pane_border="#abb2bf"

# Status bar sizing
set -g status-left-length 200
set -g status-right-length 200
set -g status-interval 5 

# Status bar content
set -g status-left "#[fg=${session_fg},bold,bg=${bg}]   #S #[fg=#BF616A]#(~/.config/tmux/scripts/ssh.sh) "
set -g status-right "#{prefix_highlight} #[fg=#81A1C1]#(~/.config/tmux/scripts/weather.sh) #[fg=${default_fg}]󰃮 %d-%m-%Y 󱑒 %H:%M"

# Status bar styling
set -g status-justify centre
set -g status-style "bg=${bg}"
set -g window-status-format "#[fg=${default_fg},bg=default] #I: #W"
set -g window-status-current-format "#[fg=${active_window_fg},bg=default,bold]  #I: #W"
set -g window-status-last-style "fg=${default_fg},bg=default"
set -g message-command-style "bg=default,fg=${default_fg}"
set -g message-style "bg=default,fg=${default_fg}"
set -g mode-style "bg=${session_selection_bg},fg=${session_selection_fg}"
set -g pane-active-border-style "fg=${active_pane_border},bg=default"
set -g pane-border-style "fg=brightblack,bg=default"

# Prefix highlight styling
set -g @prefix_highlight_fg '#3B4252'
set -g @prefix_highlight_bg '#A3BE8C'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=#3B4252,bg=#EBCB8B,bold'
set -g @prefix_highlight_show_sync_mode 'on'
set -g @prefix_highlight_sync_mode_attr 'fg=#3B4252,bg=#BF616A,bold'
set -g @prefix_highlight_prefix_prompt 'PREFIX'
set -g @prefix_highlight_copy_prompt 'COPY'
set -g @prefix_highlight_sync_prompt 'SYNC'
set -g @prefix_highlight_empty_prompt '        '
set -g @prefix_highlight_empty_attr 'fg=#4C566A,bg=#3B4252'

# Plugin settings
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'